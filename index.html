<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated gradient background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 25%, #0a1628 50%, #0d1f1a 75%, #0a0a1a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            25% { background-position: 100% 0%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 1;
            animation: float 20s ease-in-out infinite;
        }

        .orb--1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #6c3ce0, transparent 70%);
            top: -10%;
            left: -5%;
            animation-duration: 18s;
        }

        .orb--2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #e04c8a, transparent 70%);
            bottom: -10%;
            right: -5%;
            animation-duration: 22s;
            animation-delay: -5s;
        }

        .orb--3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #2dd4bf, transparent 70%);
            top: 50%;
            left: 60%;
            animation-duration: 25s;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(60px, -40px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.95); }
            75% { transform: translate(40px, 20px) scale(1.05); }
        }

        /* Particle canvas */
        canvas#particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 2rem;
        }

        /* Greeting text */
        .greeting {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c, #34d399);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGradient 6s ease infinite;
            transition: transform 0.4s ease;
            cursor: default;
        }

        .greeting.entrance {
            animation: textGradient 6s ease infinite, fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .greeting:hover {
            transform: scale(1.05);
        }

        @keyframes textGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Subtitle */
        .subtitle {
            margin-top: 1.5rem;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        /* Decorative line */
        .line {
            width: 80px;
            height: 3px;
            margin: 2rem auto;
            border-radius: 2px;
            background: linear-gradient(90deg, #a78bfa, #f472b6);
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both, lineGlow 3s ease-in-out infinite;
        }

        @keyframes lineGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(167, 139, 250, 0.3); transform: scaleX(1); }
            50% { box-shadow: 0 0 25px rgba(244, 114, 182, 0.5); transform: scaleX(1.5); }
        }

        /* Tagline */
        .tagline {
            font-size: clamp(0.9rem, 2vw, 1.15rem);
            color: rgba(255, 255, 255, 0.35);
            font-weight: 300;
            line-height: 1.8;
            max-width: 500px;
            margin: 0 auto;
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
        }

        /* Interactive ripple on click */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.3), transparent 70%);
            pointer-events: none;
            z-index: 10;
            animation: rippleOut 0.8s ease-out forwards;
        }

        @keyframes rippleOut {
            from {
                width: 0;
                height: 0;
                opacity: 1;
            }
            to {
                width: 400px;
                height: 400px;
                opacity: 0;
            }
        }

        /* Mouse glow */
        .glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: left 0.15s ease-out, top 0.15s ease-out;
        }

        /* Scroll hint */
        .corner-tag {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.15em;
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1s both, pulse 3s ease-in-out infinite 2s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.5; }
        }

        /* Star field grid */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--min-opacity); transform: scale(1); }
            50% { opacity: var(--max-opacity); transform: scale(1.5); }
        }

        /* Accessibility: reduce motion for users who prefer it */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>

    <div class="stars" id="stars"></div>

    <canvas id="particles"></canvas>

    <div class="glow" id="glow"></div>

    <main class="content">
        <h1 class="greeting entrance">Hello, World!</h1>
        <p class="subtitle">Welcome to my corner of the internet</p>
        <div class="line"></div>
        <p class="tagline">Every great journey begins with a single line of code.</p>
    </main>

    <span class="corner-tag">click anywhere</span>

    <script>
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        /* --- Remove entrance class after animation completes --- */
        const greeting = document.querySelector('.greeting');
        greeting.addEventListener('animationend', function (e) {
            if (e.animationName === 'fadeInUp') {
                greeting.classList.remove('entrance');
            }
        });

        /* --- Star field --- */
        (function initStars() {
            const container = document.getElementById('stars');
            const count = Math.min(80, Math.floor(window.innerWidth * window.innerHeight / 12000));
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--dur', (3 + Math.random() * 5) + 's');
                star.style.setProperty('--delay', (-Math.random() * 5) + 's');
                star.style.setProperty('--min-opacity', (0.1 + Math.random() * 0.2).toString());
                star.style.setProperty('--max-opacity', (0.5 + Math.random() * 0.5).toString());
                container.appendChild(star);
            }
        })();

        /* --- Particle canvas --- */
        (function initParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            const particles = [];
            const mouse = { x: -1000, y: -1000 };

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            function Particle() {
                this.reset();
            }

            Particle.prototype.reset = function () {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.radius = 1 + Math.random() * 1.5;
                this.opacity = 0.2 + Math.random() * 0.3;
                const colors = ['167,139,250', '244,114,182', '251,146,60', '52,211,153'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            };

            Particle.prototype.update = function () {
                this.x += this.vx;
                this.y += this.vy;

                /* Gentle mouse attraction */
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200 && dist > 0) {
                    const force = (200 - dist) / 200 * 0.015;
                    this.vx += dx / dist * force;
                    this.vy += dy / dist * force;
                }

                /* Damping */
                this.vx *= 0.99;
                this.vy *= 0.99;

                /* Wrap around edges */
                if (this.x < -10) this.x = canvas.width + 10;
                if (this.x > canvas.width + 10) this.x = -10;
                if (this.y < -10) this.y = canvas.height + 10;
                if (this.y > canvas.height + 10) this.y = -10;
            };

            Particle.prototype.draw = function () {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + this.color + ',' + this.opacity + ')';
                ctx.fill();
            };

            /* Initialize particles */
            const particleCount = Math.min(60, Math.floor(window.innerWidth * window.innerHeight / 20000));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            /* Draw connections between nearby particles — O(n²) but fine for capped count of 60 */
            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            const alpha = (1 - dist / 150) * 0.12;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = 'rgba(167,139,250,' + alpha + ')';
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                drawConnections();
                requestAnimationFrame(animate);
            }

            /* Only run particle animation loop if user hasn't requested reduced motion */
            if (!prefersReducedMotion) {
                animate();
            }

            /* Track mouse/touch for particle interaction and glow */
            const glow = document.getElementById('glow');
            function onPointerMove(x, y) {
                mouse.x = x;
                mouse.y = y;
                glow.style.left = x + 'px';
                glow.style.top = y + 'px';
            }
            document.addEventListener('mousemove', function (e) {
                onPointerMove(e.clientX, e.clientY);
            });
            document.addEventListener('touchmove', function (e) {
                const touch = e.touches[0];
                onPointerMove(touch.clientX, touch.clientY);
            }, { passive: true });
        })();

        /* --- Click ripple effect --- */
        document.addEventListener('click', function (e) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = (e.clientX - 200) + 'px';
            ripple.style.top = (e.clientY - 200) + 'px';
            document.body.appendChild(ripple);
            ripple.addEventListener('animationend', function () {
                ripple.remove();
            });
        });
    </script>
</body>
</html>
